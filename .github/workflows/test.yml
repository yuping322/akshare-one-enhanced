name: Multi-Platform Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    # Run integration tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Run integration tests'
        required: false
        default: 'true'
        type: boolean
      run_contract:
        description: 'Run contract tests'
        required: false
        default: 'true'
        type: boolean

jobs:
  # ============================================================================
  # Linting Job
  # ============================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Ruff linting
        run: uv run ruff check .

      - name: Run Ruff format check
        run: uv run ruff format --check .

  # ============================================================================
  # Offline Tests - Fast unit tests that don't require network
  # ============================================================================
  test-offline:
    name: Offline Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']
        exclude:
          # Exclude Windows Python 3.10 for now due to compatibility issues
          - os: windows-latest
            python-version: '3.10'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run offline tests
        run: |
          uv run pytest tests/ -v \
            --ignore=tests/test_api_contract.py \
            --ignore=tests/test_multi_source_failover.py \
            -m "not integration and not slow" \
            --tb=short \
            --maxfail=10

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            .coverage
            coverage.xml
          retention-days: 7

  # ============================================================================
  # Integration Tests - Tests requiring network access
  # ============================================================================
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint]
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-integration'))

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --dev

      - name: Run integration tests
        run: |
          uv run pytest tests/ -v \
            -m integration \
            --tb=short \
            --maxfail=5 \
            --durations=20
        continue-on-error: true

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            .coverage
            coverage.xml
          retention-days: 7

  # ============================================================================
  # Contract Tests - Golden sample validation
  # ============================================================================
  test-contract:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: [lint]
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --dev

      - name: Run contract tests
        run: |
          uv run pytest tests/test_api_contract.py -v \
            -m contract \
            --tb=short \
            --maxfail=3
        continue-on-error: true

      - name: Upload contract test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-results
          retention-days: 7

  # ============================================================================
  # Coverage Report - Generate and upload coverage reports
  # ============================================================================
  test-coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [test-offline]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ \
            --ignore=tests/test_api_contract.py \
            --ignore=tests/test_multi_source_failover.py \
            -m "not integration and not slow" \
            --cov=akshare_one \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-fail-under=30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate coverage summary
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          uv run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          retention-days: 30

  # ============================================================================
  # Build Verification
  # ============================================================================
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, test-offline]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build package
        run: uv build

      - name: Check package
        run: |
          uv pip install twine
          uv run twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ============================================================================
  # Summary Job
  # ============================================================================
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-offline, test-integration, test-contract, test-coverage]
    if: always()

    steps:
      - name: Check overall status
        run: |
          echo "# Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.test-offline.result }}" == "success" ]; then
            echo "| Offline Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Offline Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.test-integration.result }}" == "success" ]; then
            echo "| Integration Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.test-integration.result }}" == "skipped" ]; then
            echo "| Integration Tests | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Integration Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.test-contract.result }}" == "success" ]; then
            echo "| Contract Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Contract Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.test-coverage.result }}" == "success" ]; then
            echo "| Coverage Report | ✅ Generated |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Coverage Report | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Determine overall result
        run: |
          # Fail the workflow if offline tests fail (required)
          if [ "${{ needs.test-offline.result }}" != "success" ]; then
            exit 1
          fi